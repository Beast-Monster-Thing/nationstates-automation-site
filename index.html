<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovereign Ledger | NS Issue Bot</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary":                   "#002046",
            "primary-container":         "#1b365d",
            "on-primary":                "#ffffff",
            "on-primary-container":      "#87a0cd",
            "secondary":                 "#505f76",
            "secondary-container":       "#d0e1fb",
            "on-secondary-container":    "#54647a",
            "tertiary-fixed":            "#ffdea5",
            "tertiary-fixed-dim":        "#e9c176",
            "on-tertiary-fixed":         "#261900",
            "tertiary-container":        "#483200",
            "on-tertiary-container":     "#be9953",
            "surface":                   "#f9f9ff",
            "surface-dim":               "#cfdaf2",
            "surface-container-lowest":  "#ffffff",
            "surface-container-low":     "#f0f3ff",
            "surface-container":         "#e7eeff",
            "surface-container-high":    "#dee8ff",
            "surface-container-highest": "#d8e3fb",
            "on-surface":                "#111c2d",
            "on-surface-variant":        "#44474e",
            "outline":                   "#74777f",
            "outline-variant":           "#c4c6cf",
            "error":                     "#ba1a1a",
            "error-container":           "#ffdad6",
            "on-error-container":        "#93000a",
          },
          fontFamily: {
            headline: ["Manrope", "sans-serif"],
            body:     ["Inter",   "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "0.375rem",
            lg:      "0.5rem",
            xl:      "0.75rem",
            "2xl":   "1rem",
            full:    "9999px",
          },
          boxShadow: {
            ambient: "0px 12px 32px rgba(17,28,45,0.08)",
            sm:      "0px 2px 8px rgba(17,28,45,0.06)",
          },
        },
      },
    };
  </script>
</head>
<body class="bg-surface-container-low font-body text-on-surface min-h-screen flex flex-col">

<!-- Loading Overlay -->
<div id="loading-overlay" class="hidden fixed inset-0 bg-surface/90 backdrop-blur-sm z-[200] place-items-center">
  <div class="bg-surface-container-lowest rounded-2xl p-10 text-center shadow-ambient">
    <div class="spinner mx-auto"></div>
    <p id="loading-msg" class="text-sm text-on-surface-variant font-body mt-4">Loading…</p>
  </div>
</div>

<!-- Glassmorphism Header -->
<header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md shadow-sm">
  <div class="flex items-center justify-between h-16 px-8 max-w-6xl mx-auto">
    <div class="flex items-center gap-8">
      <h1 class="font-headline text-lg font-extrabold text-primary uppercase tracking-tight">Sovereign Ledger</h1>
      <nav class="flex items-center gap-1">
        <div class="tab tab-active" data-tab="priorities">Priorities</div>
        <span class="text-outline-variant px-1">·</span>
        <div class="tab" data-tab="scorer">Issue Scorer</div>
      </nav>
    </div>
    <div id="data-badge" class="hidden items-center gap-2 bg-surface-container-low px-4 py-1.5 rounded-full">
      <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
      <span id="data-badge-text" class="text-[0.6875rem] font-bold uppercase tracking-wide text-on-surface-variant"></span>
    </div>
  </div>
</header>

<!-- Content -->
<div class="flex-1">

  <!-- PRIORITIES -->
  <div class="panel panel-active" id="tab-priorities">
    <div class="p-8 max-w-4xl mx-auto">
      <div class="bg-surface-container-lowest rounded-2xl p-8 shadow-sm">
        <p class="text-[0.6875rem] font-bold uppercase tracking-[0.2em] text-outline mb-6">Priority Config Editor</p>

        <div class="flex gap-2 mb-5">
          <button class="chip chip-active" data-filter="all">All</button>
          <button class="chip" data-filter="pos">Maximize</button>
          <button class="chip" data-filter="neg">Minimize</button>
        </div>

        <div class="relative mb-5">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-size:1.1rem">search</span>
          <input id="prio-search" type="text" placeholder="Filter stats…"
            class="w-full bg-surface-container-low rounded-full pl-11 pr-5 py-3 text-sm text-on-surface placeholder:text-outline/50 outline-none focus:bg-surface-container-lowest transition-all prio-input">
        </div>

        <div class="flex gap-3 mb-6 flex-wrap">
          <button id="export-cfg-btn" class="btn-primary">
            <span class="material-symbols-outlined" style="font-size:1rem;vertical-align:-3px">download</span>
            Export priority.cfg
          </button>
          <button id="import-cfg-btn" class="btn-secondary">
            <span class="material-symbols-outlined" style="font-size:1rem;vertical-align:-3px">upload_file</span>
            Import .cfg file
          </button>
          <button id="paste-cfg-btn" class="btn-secondary">
            <span class="material-symbols-outlined" style="font-size:1rem;vertical-align:-3px">content_paste</span>
            Paste config
          </button>
          <button id="reset-prio-btn" class="btn-secondary">
            <span class="material-symbols-outlined" style="font-size:1rem;vertical-align:-3px">restart_alt</span>
            Reset to Default
          </button>
        </div>

        <input type="file" id="cfg-file-input" accept=".cfg,.txt" class="hidden">

        <!-- Paste modal -->
        <div id="paste-modal" class="hidden">
          <div class="bg-surface-container-low rounded-xl p-5 mb-6 border border-outline-variant/30">
            <p class="text-[0.6875rem] font-bold uppercase tracking-[0.15em] text-outline mb-3">Paste priority.cfg contents</p>
            <textarea id="paste-textarea"
              class="w-full bg-surface-container-lowest rounded-xl p-4 text-xs font-mono text-on-surface placeholder:text-outline/40 outline-none resize-none border border-outline-variant/20 focus:border-primary/30 transition-all"
              rows="10"
              placeholder="# Paste your priority.cfg here&#10;Religiousness — 99&#10;Defense Forces — 97&#10;Civil Rights — -95&#10;..."></textarea>
            <div class="flex gap-3 mt-3">
              <button id="paste-apply-btn" class="btn-primary">
                <span class="material-symbols-outlined" style="font-size:1rem;vertical-align:-3px">check</span>
                Apply
              </button>
              <button id="paste-cancel-btn" class="btn-secondary">Cancel</button>
            </div>
            <p id="paste-error" class="hidden text-xs text-error mt-2"></p>
          </div>
        </div>

        <div id="priority-list" class="space-y-1.5 max-h-[600px] overflow-y-auto pr-1 custom-scroll"></div>
      </div>
    </div>
  </div>

  <!-- SCORER -->
  <div class="panel" id="tab-scorer">
    <div class="p-8 max-w-5xl mx-auto">

      <div id="scorer-upload-notice" class="hidden bg-surface-container-lowest rounded-2xl p-8 shadow-sm mb-6">
        <p class="text-sm text-on-surface-variant">The CSV is loaded automatically from the repository. If it fails, refresh the page.</p>
      </div>

      <div id="scorer-content">
        <div class="relative mb-6">
          <span class="material-symbols-outlined absolute left-6 top-1/2 -translate-y-1/2 text-primary pointer-events-none">search</span>
          <input id="issue-search" type="text" placeholder="Search issue number or title…"
            class="w-full h-14 bg-surface-container-lowest rounded-full pl-14 pr-6 font-headline font-bold text-primary text-base placeholder:text-outline/40 outline-none shadow-sm focus:shadow-md transition-all">
        </div>

        <div class="flex gap-2 mb-6">
          <button class="chip chip-active" data-sort="num">By Number</button>
          <button class="chip" data-sort="best">Best Score First</button>
          <button class="chip" data-sort="worst">Worst Score First</button>
        </div>

        <div id="issue-results" class="space-y-4">
          <p class="text-center text-on-surface-variant text-sm py-10">Loading data…</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="js/priorities.js"></script>
<script src="js/scoring.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
